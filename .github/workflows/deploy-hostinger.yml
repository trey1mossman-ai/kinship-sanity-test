name: Deploy to Hostinger via Git

on:
  # Trigger on push to main (code changes)
  push:
    branches:
      - main

  # Trigger on webhook from Sanity (when client publishes content)
  repository_dispatch:
    types: [sanity-publish]

  # Weekly rebuild safety net — catches missed webhooks
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 6:00 AM MDT (13:00 UTC)

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

concurrency:
  group: "deploy-prod"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Full history needed for deploy branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: u2qzrboc
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Verify build content
        run: |
          if [ ! -d "out" ]; then
            echo "❌ ERROR: /out directory does not exist!"
            exit 1
          fi
          echo "✅ Build output exists"
          echo "📊 Total files: $(find out -type f | wc -l)"
          echo "📊 Total size: $(du -sh out | cut -f1)"

          # Content verification
          ERRORS=0

          # Check key pages exist and have content
          for page in index.html homa.html rooms.html events.html; do
            if [ ! -f "out/$page" ]; then
              echo "❌ MISSING: $page"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(wc -c < "out/$page" | tr -d ' ')
              if [ "$SIZE" -lt 5000 ]; then
                echo "❌ EMPTY: $page is only ${SIZE} bytes"
                ERRORS=$((ERRORS + 1))
              else
                echo "✅ $page (${SIZE} bytes)"
              fi
            fi
          done

          # Check for stale external fallbacks
          if grep -rq "galaxy\.tf" out/ 2>/dev/null; then
            echo "⚠️  Found galaxy.tf URLs in build output (stale fallback)"
          else
            echo "✅ No stale galaxy.tf URLs"
          fi

          # Report Sanity CDN usage
          CDN_COUNT=$(grep -rl "cdn.sanity.io" out/ 2>/dev/null | wc -l | tr -d ' ')
          echo "📊 Sanity CDN references: $CDN_COUNT files"

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ BUILD VERIFICATION FAILED: $ERRORS error(s)"
            exit 1
          fi
          echo "✅ Build verification passed"

      - name: Clean state files (remove unnecessary build artifacts)
        run: |
          find out -name "*.build-manifest.json" -delete
          find out -name "*.app-build-manifest.json" -delete
          echo "✅ Cleaned state files"

      - name: Copy production .htaccess
        run: |
          # Use the comprehensive .htaccess-production file with all redirects
          cp .htaccess-production out/.htaccess
          echo "✅ Copied .htaccess-production with 55+ redirects and canonical handling"

      - name: Deploy to deploy branch
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the out directory to temp location
          echo "📦 Saving build output..."
          cp -r out /tmp/out-deploy

          # Fetch and checkout deploy branch
          echo "🔄 Switching to deploy branch..."
          git fetch origin deploy
          git checkout deploy

          # Remove all files except .git directory
          echo "🧹 Cleaning deploy branch..."
          find . -maxdepth 1 ! -name ".git" ! -name "." -exec rm -rf {} +

          # Copy new build files
          echo "📋 Copying new build..."
          cp -r /tmp/out-deploy/* .
          cp -r /tmp/out-deploy/.* . 2>/dev/null || true

          # Show what's being deployed
          echo "📊 Files to deploy:"
          ls -la
          echo ""
          echo "Total files: $(find . -type f ! -path './.git/*' | wc -l)"
          echo "Total size: $(du -sh . | cut -f1)"

          # Commit and push
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to deploy"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            git commit -m "Deploy: $TIMESTAMP"
            git push origin deploy
            echo "✅ Successfully deployed to 'deploy' branch"
          fi

      - name: Deployment Summary
        run: |
          echo ""
          echo "================================================"
          echo "🚀 DEPLOYMENT COMPLETE"
          echo "================================================"
          echo ""
          echo "📍 Branch: deploy"
          echo "🔗 View: https://github.com/trey1mossman-ai/kinship-sanity-test/tree/deploy"
          echo ""
          echo "⏳ NEXT STEPS:"
          echo "1. Hostinger will auto-pull within 1-5 minutes"
          echo "2. Check site: https://www.kinshiplanding.com/"
          echo ""
          echo "================================================"
